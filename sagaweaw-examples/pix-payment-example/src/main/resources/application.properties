spring.application.name=pix-payment-example

spring.datasource.url=jdbc:postgresql://localhost:5432/sagaweaw
spring.datasource.username=sagaweaw
spring.datasource.password=sagaweaw
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

# Sagaweaw manages its own schema via sagaweawFlyway bean — disable Spring Boot's Flyway.
spring.flyway.enabled=false

spring.kafka.bootstrap-servers=localhost:9092

server.port=8080

sagaweaw.observability.token=${SAGAWEAW_TOKEN:demo}
